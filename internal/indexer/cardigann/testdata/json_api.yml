---
id: json_api
name: JSON API Fixture
description: "JSON-API archetype: nested rows, paths, multi-category."
language: en-US
type: public
encoding: UTF-8
links:
  - https://json.invalid/

caps:
  categorymappings:
    - {id: "movie", cat: Movies}
    - {id: "show", cat: TV}
  modes:
    search: [q]

search:
  paths:
    - path: /api/v1/search
      response:
        type: json
  inputs:
    query: "{{ .Keywords }}"
  rows:
    selector: results
  fields:
    title:
      selector: name
    download:
      selector: url
    category:
      selector: kind
    size:
      selector: bytes
    seeders:
      selector: seeders
    leechers:
      selector: leechers
    date:
      selector: added
      filters:
        - name: dateparse
          args: "yyyy-MM-ddTHH:mm:ssZ"
