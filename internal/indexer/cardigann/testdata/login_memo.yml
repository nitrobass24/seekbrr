---
id: login_memo
name: Login Memo Fixture
description: "A login-bearing def for the once-per-Engine login memoization test."
language: en-US
type: private
encoding: UTF-8
links:
  - https://memo.invalid/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

login:
  path: /login.php
  method: get
  inputs:
    username: "{{ .Config.username }}"

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
