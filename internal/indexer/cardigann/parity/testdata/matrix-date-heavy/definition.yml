---
id: dateheavy
name: dateheavy
description: "Synthetic tracker with a .NET date format parsed via dateparse."
language: en-US
type: public
encoding: UTF-8
links:
  - https://date.test/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
    date:
      selector: td.date
      filters:
        - name: dateparse
          args: "dd MMM yyyy HH:mm"
