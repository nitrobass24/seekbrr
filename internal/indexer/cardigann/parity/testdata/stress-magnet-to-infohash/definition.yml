---
id: mag2hash
name: mag2hash
description: "Magnet link -> info hash extraction (the reverse synthesis direction)."
language: en-US
type: public
encoding: UTF-8
links:
  - https://mag2hash.test/
caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]
search:
  path: /b
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    magnet:
      selector: a.magnet
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
