---
id: formlogin
name: formlogin
description: "Synthetic private HTML tracker: form login (CSRF + session cookie)."
language: en-US
type: private
encoding: UTF-8
links:
  - https://form.test/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password

login:
  path: /login.php
  submitpath: /takelogin.php
  method: form
  form: form#login
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
  error:
    - selector: span.error

search:
  paths:
    - path: /browse.php
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.torrent
  fields:
    title:
      selector: a.name
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
