---
id: downloadlink
name: downloadlink
description: "Synthetic tracker whose download link needs a resolving pre-request."
language: en-US
type: public
encoding: UTF-8
links:
  - https://dl.test/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.details
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"

download:
  before:
    path: /prepare
  selectors:
    - selector: a.torrent-dl
      attribute: href
