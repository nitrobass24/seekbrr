mode: search
description: >
  Ported from Jackett CardigannIndexerHtmlTests.TestCardigannHtmlAsync at commit
  b4140c7. Drives the byte-for-byte html-definition1.yml over html-response1.html
  and asserts Jackett's exact request URL plus its first-release field values in
