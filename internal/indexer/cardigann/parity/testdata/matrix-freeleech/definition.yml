---
id: freeleech
name: freeleech
description: "Synthetic tracker exercising download/upload volume factors."
language: en-US
type: private
encoding: UTF-8
links:
  - https://fl.test/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
    downloadvolumefactor:
      case:
        "span.freeleech": "0"
        "*": "1"
    uploadvolumefactor:
      case:
        "span.doubleup": "2"
        "*": "1"
