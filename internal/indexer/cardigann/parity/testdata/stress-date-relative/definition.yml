---
id: daterel
name: daterel
description: "Date field with relative/unix/ISO/named-day values (implicit FromUnknown)."
language: en-US
type: public
encoding: UTF-8
links:
  - https://daterel.test/
caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]
search:
  path: /b
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
    date:
      selector: td.date
