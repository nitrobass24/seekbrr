---
id: string_id_mapping
name: String Id Mapping
description: "Mapper fixture: non-Latin string tracker id with desc (hashed custom cat)."
language: zh-CN
type: private
encoding: UTF-8
links:
  - https://example.invalid/

caps:
  categorymappings:
    - {id: "影视", cat: Movies, desc: "影视"}
    - {id: "tv2", cat: TV}
  modes:
    search: [q]

search:
  path: /browse.php
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr
  fields:
    title:
      selector: a.title
    category:
      selector: a.cat
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    download:
      selector: a.dl
      attribute: href
